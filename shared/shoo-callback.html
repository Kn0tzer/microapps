<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>signing in</title>
  <script src="https://shoo.dev/shoo.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #000;
      color: #888;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 0.9rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #888;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    a {
      color: #aaa;
      text-decoration: none;
      border: 1px solid #333;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
    }
    a:hover { border-color: #666; color: #e0e0e0; }
    #err { color: #c66; }
  </style>
</head>
<body>
  <div class="dot"></div>
  <div id="msg">signing in</div>
  <a id="home" href="/" style="display:none">return home</a>
  <script src="/shared/shoo-callback.js"></script>
</body>
</html>
