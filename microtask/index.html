<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; script-src 'self' https://shoo.dev; connect-src 'self' https://microapps.work.gd; img-src 'self' data:;">
  <title>microtask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://shoo.dev/shoo.js" defer></script>
</head>
<body>
  <button id="settingsIcon" class="settings-icon" aria-label="account">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="completed-section">
    <button id="completedHeader" class="completed-header collapsed" type="button">
      <div class="arrow-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M10 12L14 16L18 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span>completed</span>
    </button>
    <div id="completedList" class="completed-list collapsed"></div>
  </div>

  <div class="container">
    <div id="taskList" class="task-list">
      <div class="task-list-inner"></div>
    </div>
  </div>

  <button id="addButton" class="add-button" aria-label="add task">
    <svg width="56" height="56" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div id="sidebar" class="sidebar">
    <div class="resize-handle" id="sidebarResizeHandle"></div>
    <div class="sidebar-header">
      <input id="sidebarTitle" class="sidebar-title" type="text" placeholder="untitled task" autocomplete="off" />
      <button id="closeSidebar" class="close-sidebar" aria-label="close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <textarea id="taskDescription" class="task-description" placeholder="add description" autocomplete="off"></textarea>

    <div class="subtasks-section">
      <div id="subtasksList" class="subtasks-list"></div>
      <button id="addSubtaskButton" class="add-subtask-button" aria-label="add subtask">
        <svg width="48" height="48" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="settingsOverlay" class="settings-overlay">
    <div class="settings-box">
      <div class="settings-content">
        <div id="authSection" class="auth-section">
          <button id="signInBtn" class="auth-button">sign in</button>
          <button id="signOutBtn" class="auth-button secondary" style="display:none">sign out</button>
        </div>
      </div>
    </div>
  </div>

  <div id="mobileTaskModal" class="mobile-task-modal">
    <div class="mobile-task-modal-content">
      <input id="mobileTaskInput" class="mobile-task-input" type="text" placeholder="task title" autocomplete="off" />
      <button id="mobileTaskSubmit" class="mobile-task-submit" aria-label="add task">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M5 12L19 12M13 6L19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="overlay" class="overlay"></div>

  <script src="../shared/auth.js"></script>
  <script src="../shared/sync.js"></script>

  <script src="script.js"></script>
</body>
</html>
